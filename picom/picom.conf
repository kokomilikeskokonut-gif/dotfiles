#################################
# Backend
#################################
backend = "glx";
vsync = true;

#################################
# Transparency
#################################
active-opacity = 0.95;
inactive-opacity = 0.85;

# Keep full opacity for focused window
focus-exclude = [ ];

#################################
# Fading (subtle animations)
#################################
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

#################################
# Shadows (optional but nice)
#################################
shadow = true;
shadow-radius = 10;
shadow-opacity = 0.3;
shadow-offset-x = -5;
shadow-offset-y = -5;

#################################
# Blur (very subtle, optional)
#################################
blur:
{
  method = "dual_kawase";
  strength = 3;
};

#################################
# Rounded corners (optional)
#################################
corner-radius = 0;

#################################
# Exclusions (don’t fade panels, etc.)
#################################
wintypes:
{
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.95; };
  dropdown_menu = { opacity = 0.95; };
};
